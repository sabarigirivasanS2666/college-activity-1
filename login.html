<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Odoo Café POS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="index.html" class="logo">☕ Odoo<span>Café</span></a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#features">Features</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
            <div class="nav-actions">
                <a href="login.html" class="btn btn-primary btn-sm">Login</a>
                <button class="nav-toggle">☰</button>
            </div>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-box glass-card">
            <a href="index.html" class="logo" style="justify-content:center; margin-bottom:18px;">☕
                Odoo<span>Café</span></a>
            <div id="formTitle">
                <h2>Welcome back</h2>
                <p class="sub">Sign in to manage your café dashboard</p>
            </div>

            <div class="alert alert-error" id="errorAlert"></div>
            <div class="alert alert-success" id="successAlert"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" class="form-control" id="loginEmail" placeholder="admin@odoocafe.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Sign In</button>
            </form>

            <p class="demo-creds">Use <strong>admin@odoocafe.com</strong> / <strong>admin123</strong> to sign in.</p>
            <div class="auth-switch">
                <a href="index.html">← Back to home</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="login.js"></script>
</body>

</html>
